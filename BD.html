            color: #cd7c9b;
            font-size: 1rem;

            padding: 12px 20px;
            border-radius: 50px;

                transform: translateY(10px);

                transform: translateY(0);

        "Вы и ваш малыш": "fa-hand-holding-heart"

    // Функция для генерации HTML всех тем
    function renderTopics(filterText = "") {
        const container = document.getElementById("topicsContainer");
        if (!container) return;

        // Фильтруем темы
        let filteredTopics = topicsData;
        if (filterText.trim() !== "") {
            const searchLower = filterText.toLowerCase();
            filteredTopics = topicsData.filter(topic =>
                topic.title.toLowerCase().includes(searchLower) ||
                topic.number.toString().includes(searchLower)
            );
        }

        // Группируем по разделам
        const sections = {};
        filteredTopics.forEach(topic => {
            if (!sections[topic.section]) {
                sections[topic.section] = [];
            }
            sections[topic.section].push(topic);
        });

        // Порядок разделов
        const sectionOrder = ["Первый триместр", "Второй триместр", "Третий триместр", "Вы и ваш малыш"];

        let html = "";
        for (const sectionName of sectionOrder) {
            const topicsInSection = sections[sectionName];
            if (topicsInSection && topicsInSection.length > 0) {
                const iconClass = sectionIcons[sectionName] || "fa-book";
                html += `
                    <div class="section">
                        <div class="section-title">
                            <i class="fas ${iconClass}"></i>
                            <h2>${sectionName}</h2>
                        </div>
                        <div class="topics-grid">
                `;
                topicsInSection.forEach(topic => {
                    // Добавляем анимацию с задержкой
                    html += `
                        <div class="topic-card" data-topic-id="${topic.id}" data-topic-number="${topic.number}" data-topic-title="${topic.title.replace(/"/g, '&quot;')}">

                            <div class="topic-content">
                                <div class="topic-title">${escapeHtml(topic.title)}</div>
                                <div class="topic-sub">
                                    <i class="fas fa-chevron-right"></i> Нажмите для перехода
                                </div>
                            </div>
                            <div class="topic-arrow">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
        }

        // Если ничего не найдено
        if (filteredTopics.length === 0) {
            html = `<div style="text-align: center; padding: 40px 20px; background: white; border-radius: 28px;">
                        <i class="fas fa-search" style="font-size: 3rem; color: #cd7c9b; margin-bottom: 12px;"></i>
                        <p style="color: #ab8a96;">Ничего не найдено 😔</p>
                        <p style="font-size: 0.8rem; margin-top: 8px;">Попробуйте изменить поисковый запрос</p>
                    </div>`;
        }

        container.innerHTML = html;

        // Добавляем обработчики кликов на каждую тему
        document.querySelectorAll(".topic-card").forEach(card => {
            card.addEventListener("click", (e) => {
                // Не даем всплыть, если клик по внутренним элементам
                e.stopPropagation();
                const topicId = card.getAttribute("data-topic-id");
                const topicNumber = card.getAttribute("data-topic-number");
                const topicTitle = card.getAttribute("data-topic-title");

                // Формируем URL для перехода
                // Здесь можно настроить ссылки индивидуально для каждой темы
                // Пока используем единую структуру: /topic/номер-темы.html
                // Вы можете изменить этот шаблон под свои нужды
                let targetUrl = `https://maxonlinexd.github.io/BD/${topicNumber}.html`;

                // Альтернативный вариант: можно показывать модальное окно с напоминанием, что нужно настроить ссылки
                // Для демонстрации сделаем переход с предупреждением (можно убрать)
                console.log(`Переход по теме ${topicNumber}: ${topicTitle} -> ${targetUrl}`);

                // Выполняем переход
                window.location.href = targetUrl;
            });
        });
    }

    // Функция для экранирования HTML
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    let searchTimeout;
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderTopics(e.target.value);
            }, 300);
        });
    }

    // Кнопка назад на главную
    const backBtn = document.getElementById("backToMainBtn");
    if (backBtn) {
        backBtn.addEventListener("click", () => {
            window.location.href = "https://maxonlinexd.github.io/";
        });
    }

    // Инициализация
    renderTopics("");

    // Для страниц, открытых из главного меню, можно добавить подсветку
    console.log("База знаний загружена. Всего тем: " + topicsData.length);
