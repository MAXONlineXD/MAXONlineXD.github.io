        const data = monthsData[month];
        if (!data) return;

        let skillsHtml = "";
        if (data.skills && data.skills.length) {
            skillsHtml = `<div class="subsection-title"><i class="fas fa-star"></i> Что умеет малыш</div><ul>` + data.skills.map(s => `<li>${s}</li>`).join('') + `</ul>`;
        }

        const html = `
            <div class="month-card">
                <div class="month-header">
                    <span class="month-number">${month} месяц</span>
                    <span class="month-title">${data.title}</span>
                </div>
                <div class="subsection-title"><i class="fas fa-weight-scale"></i> Вес и рост</div>
                <p>${data.weight}</p>
                <p>${data.height}</p>
                
                <div class="subsection-title"><i class="fas fa-bed"></i> Сон</div>
                <p>${data.sleep}</p>
                
                <div class="subsection-title"><i class="fas fa-hand-holding-heart"></i> Питание</div>
                <p>${data.feeding}</p>
                
                ${skillsHtml}
                
                <div class="subsection-title"><i class="fas fa-stethoscope"></i> Осмотры и прививки</div>
                <p><strong>Осмотры:</strong> ${data.health}</p>
                <p><strong>Вакцинация:</strong> ${data.vaccinations}</p>
                
                <div class="tip-box"><i class="fas fa-lightbulb"></i> <strong>Совет месяца:</strong> ${data.tip}</div>
            </div>
        `;
        container.innerHTML = html;
    }

    const monthTabs = document.querySelectorAll(".month-tab");
    monthTabs.forEach(tab => {
        tab.addEventListener("click", () => {
            const month = tab.getAttribute("data-month");
            if (!month) return;
            monthTabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            currentMonth = month;
            renderMonth(currentMonth);
            const contentDiv = document.getElementById("monthContent");
            if (contentDiv) contentDiv.scrollIntoView({ behavior: "smooth", block: "start" });
        });
    });

    const backToKnowledgeBtn = document.getElementById("backToKnowledgeBtn");
    if (backToKnowledgeBtn) {
        backToKnowledgeBtn.addEventListener("click", () => {
            window.location.href = "https://maxonlinexd.github.io/BD.html";
        });
    }

    const floatingHomeBtn = document.getElementById("floatingHomeBtn");
    if (floatingHomeBtn) {
        floatingHomeBtn.addEventListener("click", () => {
            window.location.href = "https://maxonlinexd.github.io/";
        });
    }

    renderMonth("1");
</script>
</body>
</html>
