<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Вы и ваш малыш: первый месяц (недели 1–4) — Перинатальный центр</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fef7f2;
            color: #2d2a2e;
            line-height: 1.5;
            padding-bottom: 50px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 18px;
        }

        /* Хедер */
        .hero {
            background: linear-gradient(135deg, #f8c9d4 0%, #fcd9e5 100%);
            border-radius: 0 0 32px 32px;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #4a2c3a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hero h1 i {
            background: #ffffffcc;
            padding: 8px;
            border-radius: 60px;
            font-size: 1.4rem;
            color: #b35d7c;
        }

        .hero p {
            font-size: 1rem;
            font-weight: 500;
            color: #5e3e4b;
        }

        .badge {
            background: #fff0e8;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #b45f7f;
            margin-top: 12px;
        }

        /* Блок с кнопками */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #fbeae8;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #9f5879;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:active {
            background: #f0dbd6;
            transform: scale(0.97);
        }

        /* Инфо-панель с неделями */
        .week-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .week-tab {
            background: white;
            border: 1px solid #ffe0d6;
            padding: 10px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #9f5879;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .week-tab.active {
            background: #fbeae8;
            border-color: #cd7c9b;
            color: #b35d7c;
        }

        .week-tab:active {
            transform: scale(0.96);
        }

        /* Карточка недели */
        .week-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #ffefe8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            animation: fadeInUp 0.3s ease backwards;
        }

        .week-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 2px dotted #ffe0d6;
            padding-bottom: 12px;
        }

        .week-number-badge {
            background: #fbeae8;
            border-radius: 60px;
            padding: 6px 16px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #b35d7c;
        }

        .week-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: #4a2c3a;
        }

        .section-title {
            font-weight: 700;
            font-size: 1rem;
            color: #b35d7c;
            margin: 16px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 1rem;
        }

        .week-content {
            color: #4a4a55;
            font-size: 0.95rem;
        }

        .week-content p {
            margin-bottom: 10px;
        }

        .week-content ul {
            padding-left: 20px;
            margin: 8px 0;
        }

        .week-content li {
            margin: 6px 0;
        }

        .baby-size {
            background: #fffaf5;
            border-radius: 16px;
            padding: 10px 14px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #b45f7f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tip-box {
            background: #fffaf5;
            border-left: 4px solid #f3bfcf;
            padding: 12px 16px;
            border-radius: 16px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #b45f7f;
        }

        .tip-box i {
            margin-right: 8px;
        }

        /* Плавающая кнопка */
        .floating-home-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #e06c8c;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(224, 108, 140, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 1000;
            border: none;
            font-size: 1.6rem;
        }

        .floating-home-btn:active {
            transform: scale(0.92);
            background: #c95778;
        }

        @media (max-width: 600px) {
            .floating-home-btn {
                bottom: 100px;
                right: 16px;
                width: 50px;
                height: 50px;
                font-size: 1.4rem;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #cba7b4;
            padding: 20px 0 10px;
            margin-top: 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px 16px;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .week-title {
                font-size: 1rem;
            }
            .nav-buttons {
                flex-direction: column;
            }
            .nav-btn {
                justify-content: center;
            }
            .week-tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="container" style="padding: 0;">
        <h1>
            <i class="fas fa-baby-carriage"></i> 
            Вы и ваш малыш
        </h1>
        <p>Первый месяц беременности: недели 1–4</p>
        <div class="badge"><i class="fas fa-calendar-week"></i> От зачатия до 4-й недели — самое начало пути</div>
    </div>
</div>

<main class="container">
    <!-- Блок кнопок навигации -->
    <div class="nav-buttons">
        <button class="nav-btn" id="backToKnowledgeBtn">
            <i class="fas fa-database"></i> Вернуться в Базу знаний
        </button>
    </div>

    <!-- Навигация по неделям -->
    <div class="week-tabs">
        <button class="week-tab active" data-week="1">1-я неделя</button>
        <button class="week-tab" data-week="2">2-я неделя</button>
        <button class="week-tab" data-week="3">3-я неделя</button>
        <button class="week-tab" data-week="4">4-я неделя</button>
    </div>

    <!-- Контейнер для контента недели -->
    <div id="weekContent"></div>

    <footer>
        <i class="fas fa-seedling"></i> «Сургутский клинический перинатальный центр» — забота на каждом этапе
    </footer>
</main>

<!-- Плавающая кнопка "На главную" -->
<button class="floating-home-btn" id="floatingHomeBtn">
    <i class="fas fa-home"></i>
</button>

<script>
    // Данные по неделям первого месяца
    const weeksData = {
        1: {
            title: "Первая неделя беременности (акушерская)",
            baby: "Фактически зачатие еще не произошло. Акушерский срок считают от первого дня последней менструации. В эту неделю организм готовится к овуляции.",
            mom: "Идет менструация. Эндометрий (внутренний слой матки) обновляется. Это время, когда вы еще не беременны, но цикл начинает отсчет новой потенциальной жизни.",
            development: "В яичниках созревает фолликул, который в середине цикла выпустит яйцеклетку. Важно: реальный возраст эмбриона примерно на 2 недели меньше акушерского срока.",
            size: "Беременности еще нет, яйцеклетка созревает",
            tip: "Если вы планируете беременность, уже сейчас начните принимать фолиевую кислоту (400–800 мкг в день) и откажитесь от алкоголя."
        },
        2: {
            title: "Вторая неделя беременности",
            baby: "Зачатия пока нет. Яйцеклетка созревает в фолликуле и готовится к выходу. Овуляция происходит в конце этой недели — начале следующей.",
            mom: "Уровень эстрогена растет, слизистая шейки матки становится более жидкой (благоприятная среда для сперматозоидов). Некоторые женщины чувствуют легкое покалывание внизу живота в момент овуляции.",
            development: "Это лучшее время для зачатия. Яйцеклетка живет 12–24 часа после овуляции. Сперматозоиды могут сохранять активность до 5 дней.",
            size: "Яйцеклетка невооруженным глазом не видна (около 0,1 мм)",
            tip: "Овуляцию можно отследить по тестам, измерению базальной температуры или специальным приложениям."
        },
        3: {
            title: "Третья неделя — ЗАЧАТИЕ!",
            baby: "Происходит оплодотворение! Сперматозоид проникает в яйцеклетку — образуется зигота. Начинается деление клеток. Зигота движется по маточной трубе в полость матки.",
            mom: "Вы пока не чувствуете беременность. Возможны очень легкие имплантационные выделения (розоватые или коричневатые) на 6–12 день после зачатия — когда эмбрион прикрепляется к стенке матки.",
            development: "Клетки активно делятся. Формируется морула, затем бластоциста. Уже заложен генетический пол и цвет глаз малыша. Начинает вырабатываться ХГЧ — гормон беременности.",
            size: "0,1–0,2 мм (как маковое зернышко)",
            tip: "В это время особенно важно избегать вредных факторов: алкоголя, курения, лекарств без назначения врача."
        },
        4: {
            title: "Четвертая неделя беременности",
            baby: "Бластоциста имплантируется (прикрепляется) к стенке матки. Начинают формироваться три зародышевых листка: эктодерма (нервная система, кожа), мезодерма (мышцы, скелет, сердце), эндодерма (легкие, кишечник).",
            mom: "Происходит задержка менструации — самый явный признак! Может появиться легкая тошнота, набухание груди, усталость. Тест на беременность уже покажет положительный результат.",
            development: "Закладывается нервная трубка (будущий головной и спинной мозг). Начинают формироваться плацента и пуповина. Эмбрион получает питание из желточного мешка.",
            size: "1 мм (как маковое зёрнышко). Сердечко еще не бьется, но уже закладываются его клетки.",
            tip: "Сделайте тест на беременность и запишитесь к врачу для подтверждения. Начинайте вести дневник самочувствия."
        }
    };

    let currentWeek = "1";

    function renderWeek(week) {
        const container = document.getElementById("weekContent");
        if (!container) return;

        const data = weeksData[week];
        if (!data) return;

        const html = `
            <div class="week-card" style="animation-delay: 0s">
                <div class="week-header">
                    <span class="week-number-badge">Неделя ${week}</span>
                    <span class="week-title">${data.title}</span>
                </div>
                
                <div class="week-content">
                    <div class="section-title">
                        <i class="fas fa-baby"></i> Развитие малыша
                    </div>
                    <p>${data.baby}</p>
                    
                    <div class="baby-size">
                        <i class="fas fa-ruler"></i> Размер: ${data.size}
                    </div>
                    
                    <div class="section-title">
                        <i class="fas fa-female"></i> Что происходит с мамой
                    </div>
                    <p>${data.mom}</p>
                    
                    <div class="section-title">
                        <i class="fas fa-chart-line"></i> Важные процессы
                    </div>
                    <p>${data.development}</p>
                    
                    <div class="tip-box">
                        <i class="fas fa-lightbulb"></i> <strong>Совет недели:</strong> ${data.tip}
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;
    }

    // Переключение недель
    const weekTabs = document.querySelectorAll(".week-tab");
    weekTabs.forEach(tab => {
        tab.addEventListener("click", () => {
            const week = tab.getAttribute("data-week");
            if (!week) return;
            
            weekTabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            
            currentWeek = week;
            renderWeek(currentWeek);
            
            // Плавный скролл к контенту
            const contentDiv = document.getElementById("weekContent");
            if (contentDiv) {
                contentDiv.scrollIntoView({ behavior: "smooth", block: "start" });
            }
        });
    });

    // Кнопка возврата в Базу знаний
    const backToKnowledgeBtn = document.getElementById("backToKnowledgeBtn");
    if (backToKnowledgeBtn) {
        backToKnowledgeBtn.addEventListener("click", () => {
            window.location.href = "https://maxonlinexd.github.io/BD.html";
        });
    }

    // Плавающая кнопка "На главную"
    const floatingHomeBtn = document.getElementById("floatingHomeBtn");
    if (floatingHomeBtn) {
        floatingHomeBtn.addEventListener("click", () => {
            window.location.href = "https://maxonlinexd.github.io/";
        });
    }

    // Инициализация — показываем 1-ю неделю
    renderWeek("1");
</script>
</body>
</html>
